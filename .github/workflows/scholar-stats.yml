# Weekly pipeline: fetch Scholar stats via scholarly (Python) and commit to public/
# Free option – no SerpApi key needed. May fail if Google blocks; then use SerpApi.
name: Update Scholar Stats

permissions:
  contents: write  # Needed to push commits

on:
  schedule:
    - cron: "0 12 * * 0"  # Sundays at 12:00 UTC
  workflow_dispatch:  # Allow manual run

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scholarly
        run: pip install scholarly

      - name: Fetch Scholar stats
        env:
          SCHOLAR_AUTHOR_ID: "0YSmKi4AAAAJ"
        run: python scripts/fetch-scholar-stats.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/scholar-stats.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update Scholar stats"
            git push
          fi
